<!DOCTYPE html> 
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIAGFLEET — Central de Diagnóstico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <style>
        :root {
            --bg: #0D1117; --surface: #161B22; --surface2: #1C2128; --border: #30363D;
            --border2: #484F58; --text: #E6EDF3; --text2: #8B949E; --text3: #484F58;
            --amber: #F0A500; --red: #F85149; --green: #3FB950; --blue: #58A6FF;
            --orange: #E3894B; --red-bg: rgba(248,81,73,.1); --amber-bg: rgba(240,165,0,.1);
            --blue-bg: rgba(88,166,255,.08); --radius-lg: 10px;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        html { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-size:13px; }
        .app { display:flex; flex-direction:column; min-height:100vh; }
        .header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:56px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
        .logo { display:flex; align-items:center; gap:10px; font-weight:600; font-family:'IBM Plex Mono',monospace; }
        .logo span { color:var(--amber); }
        .status-dot { width:7px; height:7px; border-radius:50%; background:var(--text3); display:inline-block; margin-right:5px; }
        .status-dot.live { background:var(--green); box-shadow: 0 0 8px var(--green); }
        .status-dot.error { background:var(--red); }
        .btn { padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text); cursor:pointer; font-size:12px; }
        .btn.primary { background:var(--amber); color:#000; border:none; font-weight:600; }
        .main { flex:1; padding:20px; max-width:1400px; width:100%; margin:0 auto; }
        .kpis { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px; }
        .kpi { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:15px; }
        .kpi-val { font-family:'IBM Plex Mono',monospace; font-size:24px; font-weight:600; display:block; margin-top:5px; }
        .decisions { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:12px; margin-bottom:20px; }
        .decision-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); border-left:4px solid var(--border); padding:15px; }
        .route-eletrica-urgente { border-left-color: var(--red); }
        .route-eletrica-investigar { border-left-color: var(--orange); }
        .route-mecanica { border-left-color: var(--blue); }
        .bat-bar { height:6px; background:var(--border); border-radius:3px; margin:10px 0; overflow:hidden; }
        .bat-fill { height:100%; transition: width 0.5s; }
        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:16px; margin-bottom:20px; }
        table { width:100%; border-collapse:collapse; font-size:11px; margin-top:10px; }
        th { text-align:left; color:var(--text2); padding:8px; border-bottom:1px solid var(--border); }
        td { padding:10px 8px; border-bottom:1px solid var(--border); }
        .tag { padding:2px 6px; border-radius:4px; font-weight:600; font-size:10px; }
        .tag-crit { background:var(--red-bg); color:var(--red); }
        .tag-warn { background:var(--amber-bg); color:var(--amber); }
        .loading-wrap { display:flex; flex-direction:column; align-items:center; padding:100px; color:var(--text2); }
        .spinner { width:30px; height:30px; border:3px solid var(--border); border-top-color:var(--amber); border-radius:50%; animation:spin 1s linear infinite; margin-bottom:15px; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="logo">⚡ DIAG<span>FLEET</span></div>
        <div style="font-size:11px; color:var(--text2)">
            <span class="status-dot" id="statusDot"></span><span id="statusText">Conectando...</span>
        </div>
        <button class="btn primary" onclick="loadData()">🔄 Sincronizar Agora</button>
    </div>

    <div class="main">
        <div id="emptyState" class="loading-wrap">
            <div class="spinner"></div>
            <p>Buscando dados da frota no Metabase...</p>
        </div>

        <div id="dashContent" style="display:none;">
            <div class="kpis">
                <div class="kpi" style="border-top: 3px solid var(--red)">
                    <span style="font-size:10px; color:var(--text2)">ELÉTRICA URGENTE</span>
                    <span class="kpi-val" id="kpi1" style="color:var(--red)">0</span>
                </div>
                <div class="kpi" style="border-top: 3px solid var(--orange)">
                    <span style="font-size:10px; color:var(--text2)">INVESTIGAR BATERIA</span>
                    <span class="kpi-val" id="kpi2" style="color:var(--orange)">0</span>
                </div>
                <div class="kpi" style="border-top: 3px solid var(--blue)">
                    <span style="font-size:10px; color:var(--text2)">MECÂNICA</span>
                    <span class="kpi-val" id="kpi3" style="color:var(--blue)">0</span>
                </div>
                <div class="kpi">
                    <span style="font-size:10px; color:var(--text2)">DIAGNÓSTICOS</span>
                    <span class="kpi-val" id="kpi4">0</span>
                </div>
                <div class="kpi">
                    <span style="font-size:10px; color:var(--text2)">TENSÃO MÉDIA</span>
                    <span class="kpi-val" id="kpi5" style="color:var(--green)">0V</span>
                </div>
            </div>

            <div class="decisions" id="decisionsGrid"></div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <span style="font-weight:600">HISTÓRICO DE TENSÃO</span>
                    <select id="chartPlacaSel" onchange="updateChart()" style="background:var(--surface2); color:var(--text); border:1px solid var(--border); font-size:11px;"></select>
                </div>
                <div style="height:250px;"><canvas id="batChart"></canvas></div>
            </div>

            <div class="card">
                <span style="font-weight:600">DETALHAMENTO DE OCORRÊNCIAS</span>
                <table>
                    <thead>
                        <tr>
                            <th>PLACA</th>
                            <th>DATA/HORA</th>
                            <th>CÓDIGO DTC</th>
                            <th>TENSÃO</th>
                            <th>ROTEAMENTO</th>
                        </tr>
                    </thead>
                    <tbody id="dtcTbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
console.log("Script DIAGFLEET iniciado.");

let STATE = {
    config: { mode: 'apikey' },
    raw: [],
    batHistory: {},
    processed: [],
    batChart: null
};

// FUNÇÃO PRINCIPAL DE CARREGAMENTO
async function loadData() {
    console.log("Iniciando loadData...");
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    
    dot.className = 'status-dot';
    txt.textContent = 'Sincronizando...';

    try {
        const rows = await fetchMetabase();
        console.log("Dados recebidos com sucesso:", rows.length, "linhas");

        STATE.raw = rows;
        processData(rows);
        renderDashboard();

        dot.className = 'status-dot live';
        txt.textContent = 'Dados Atualizados';
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('dashContent').style.display = 'block';
    } catch (err) {
        console.error("Erro no loadData:", err);
        dot.className = 'status-dot error';
        txt.textContent = 'Erro na conexão';
        alert("Erro ao carregar dados: " + err.message);
    }
}

// BUSCA NO GOOGLE APPS SCRIPT
async function fetchMetabase() {
    // CERTIFIQUE-SE QUE ESTA URL É A SUA URL DO GOOGLE SCRIPTS (A QUE TERMINA EM /exec)
    const scriptUrl = "https://script.google.com/macros/s/AKfycbyqp4I3WwQEA0yBvPAhU2q_DDUEL6fIwm4Svc2KERzcAVUYZKD0o8oveKpGUhpbzDG7vw/exec"; 

    const res = await fetch(scriptUrl);
    if (!res.ok) throw new Error("Erro na rede.");
    
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    if (Array.isArray(data)) return data;
    if (data.data && data.data.rows) {
        const cols = data.data.cols.map(c => c.display_name || c.name);
        return data.data.rows.map(r => {
            const o = {};
            cols.forEach((c, i) => o[c] = r[i]);
            return o;
        });
    }
    return [];
}

function processData(rows) {
    STATE.batHistory = {};
    const diagMap = {};
    let totalV = 0, countV = 0;

    rows.forEach(r => {
        const placa = r['Placa'] || r['placa'];
        const v = parseFloat(r['Tensão Bateria'] || r['tensao'] || 0);
        const dt = r['Data/Hora Leitura (Para o Gráfico)'] || r['data_leitura'];
        const code = r['Códigos encontrados'] || r['dtc'];

        if (!placa) return;

        if (dt && !isNaN(v) && v > 0) {
            if (!STATE.batHistory[placa]) STATE.batHistory[placa] = [];
            STATE.batHistory[placa].push({ t: new Date(dt), y: v });
            totalV += v; countV++;
        }

        const diagDt = r['Diagnóstico finalizado em'] || r['data_diag'];
        if (diagDt) {
            const key = `${placa}_${diagDt}`;
            if (!diagMap[key]) diagMap[key] = { placa, dt: diagDt, codes: [], v: v };
            if (code && !diagMap[key].codes.includes(code)) diagMap[key].codes.push(code);
        }
    });

    STATE.avgFrota = countV > 0 ? (totalV / countV).toFixed(2) : 0;

    STATE.processed = Object.values(diagMap).map(d => {
        let route = 'MECÂNICA';
        if (d.v > 0 && d.v < 12.0) route = 'ELÉTRICA_URGENTE';
        else if (d.v < 12.4) route = 'ELÉTRICA_INVESTIGAR';
        return { ...d, route };
    }).sort((a, b) => new Date(b.dt) - new Date(a.dt));
}

function renderDashboard() {
    const p = STATE.processed;
    document.getElementById('kpi1').textContent = p.filter(x => x.route === 'ELÉTRICA_URGENTE').length;
    document.getElementById('kpi2').textContent = p.filter(x => x.route === 'ELÉTRICA_INVESTIGAR').length;
    document.getElementById('kpi3').textContent = p.filter(x => x.route === 'MECÂNICA').length;
    document.getElementById('kpi4').textContent = p.length;
    document.getElementById('kpi5').textContent = STATE.avgFrota + "V";

    const grid = document.getElementById('decisionsGrid');
    grid.innerHTML = p.slice(0, 12).map(d => {
        const color = d.v < 12 ? 'var(--red)' : d.v < 12.4 ? 'var(--orange)' : 'var(--green)';
        const routeClass = d.route.toLowerCase().replace(/_/g, '-');
        const pct = Math.min(100, Math.max(0, ((d.v - 10.5) / 4) * 100));

        return `
            <div class="decision-card route-${routeClass}">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <span style="font-weight:600; font-family:monospace; font-size:15px;">${d.placa}</span>
                    <span class="tag ${d.route.includes('ELÉTRICA') ? 'tag-crit' : ''}" style="font-size:9px;">${d.route.replace(/_/g, ' ')}</span>
                </div>
                <div style="font-size:20px; font-weight:600; color:${color}">${d.v.toFixed(2)}V</div>
                <div class="bat-bar"><div class="bat-fill" style="width:${pct}%; background:${color}"></div></div>
                <div style="margin-top:10px;">
                    ${d.codes.map(c => `<span style="background:var(--surface2); padding:2px 5px; border-radius:3px; font-size:10px; margin-right:4px;">${c}</span>`).join('')}
                </div>
            </div>
        `;
    }).join('');

    const tbody = document.getElementById('dtcTbody');
    tbody.innerHTML = p.slice(0, 20).map(d => `
        <tr>
            <td style="font-family:monospace; font-weight:600;">${d.placa}</td>
            <td>${new Date(d.dt).toLocaleString('pt-BR')}</td>
            <td>${d.codes.join(', ')}</td>
            <td><span class="tag ${d.v < 12.4 ? 'tag-warn' : ''}">${d.v.toFixed(2)}V</span></td>
            <td>${d.route.replace(/_/g, ' ')}</td>
        </tr>
    `).join('');

    const sel = document.getElementById('chartPlacaSel');
    const placas = Object.keys(STATE.batHistory);
    sel.innerHTML = placas.map(pl => `<option value="${pl}">${pl}</option>`).join('');
    if (placas.length > 0) renderChart(placas[0]);
}

function updateChart() {
    renderChart(document.getElementById('chartPlacaSel').value);
}

function renderChart(placa) {
    const ctx = document.getElementById('batChart').getContext('2d');
    const data = STATE.batHistory[placa] || [];
    if (STATE.batChart) STATE.batChart.destroy();
    
    STATE.batChart = new Chart(ctx, {
        type: 'line',
        data: {
            datasets: [{
                label: 'Tensão',
                data: data.map(pt => ({ x: pt.t, y: pt.y })),
                borderColor: '#58A6FF',
                borderWidth: 2,
                pointRadius: 0,
                fill: true,
                backgroundColor: 'rgba(88, 166, 255, 0.05)',
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { type: 'time', time: { unit: 'day' }, grid: { display: false }, ticks: { color: '#8B949E' } },
                y: { min: 10, max: 15, grid: { color: '#30363D' }, ticks: { color: '#8B949E' } }
            }
        }
    });
}

// AUTO-INICIALIZAÇÃO
window.onload = function() {
    console.log("Página carregada. Chamando loadData...");
    loadData();
};
</script>

</body>
</html>
